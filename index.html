<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Thomas Ian Nicholas — Tour Dates</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Avenir is not a free web font. Avenir Next/Avenir load on Apple + licensed devices;
     Nunito Sans 300 is the closest free stand-in for everyone else. -->
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#ffffff;        /* foreground: text / pins / borders (white) */
    --paper:#0e0e0e;      /* background (near-black) */
    --mid:#9a9a9a;        /* secondary text */
    --hair:#2a2a2a;       /* hairline dividers/borders */
    --faint:#1c1c1c;      /* hover fill */
    --font:'Avenir Next','Avenir','Nunito Sans',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}   /* fill the Wix iframe's height */
  body{background:var(--paper);color:var(--ink);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased;}
  #app{width:100%;height:100%;display:flex;flex-direction:column;}

  /* ── Top bar ── */
  #bar{
    padding:16px 18px 14px;
    border-bottom:1px solid var(--hair);
    background:var(--paper);
  }
  .eyebrow{
    font-size:10px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--mid);font-weight:600;margin-bottom:11px;
  }
  #row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

  .toggle{
    font-family:var(--font);font-size:11px;font-weight:600;
    letter-spacing:.12em;text-transform:uppercase;
    padding:8px 15px;border:1px solid var(--ink);border-radius:999px;
    background:var(--paper);color:var(--ink);cursor:pointer;
    transition:background .15s,color .15s;
  }
  .toggle:hover{background:var(--faint);}
  .toggle.active{background:var(--ink);color:var(--paper);}
  .toggle:focus-visible{outline:2px solid var(--ink);outline-offset:2px;}

  #count{
    margin-left:auto;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--mid);font-weight:400;
  }
  #count b{color:var(--ink);font-weight:600;}

  #next-line{
    margin-top:11px;font-size:12px;letter-spacing:.02em;color:var(--mid);font-weight:300;
  }
  #next-line b{color:var(--ink);font-weight:600;letter-spacing:.03em;}
  #next-line.hidden{display:none;}

  /* ── Map ── */
  #map{flex:1 1 auto;min-height:300px;width:100%;background:var(--paper);}
  #loading{
    display:flex;align-items:center;justify-content:center;
    flex:1 1 auto;min-height:300px;background:var(--paper);
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mid);font-weight:600;
  }
  #notice{
    display:none;padding:9px 18px;background:var(--faint);
    border-bottom:1px solid var(--hair);
    font-size:11px;letter-spacing:.04em;color:var(--mid);font-weight:400;
  }

  /* ── Pins (the heart logo) ── */
  .tin-pin{position:relative;width:32px;height:32px;}
  .tin-pin img{width:32px;height:32px;object-fit:contain;display:block;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.55));}
  .tin-pin.is-next::before{                          /* one pulse on the very next show */
    content:'';position:absolute;left:50%;top:50%;width:32px;height:32px;
    border:1.5px solid var(--ink);border-radius:50%;
    transform:translate(-50%,-50%);
    animation:tin-pulse 2.2s ease-out infinite;
  }
  @keyframes tin-pulse{
    0%{opacity:.5;transform:translate(-50%,-50%) scale(.6);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(2.1);}
  }
  @media (prefers-reduced-motion: reduce){
    .tin-pin.is-next::before{animation:none;opacity:.35;transform:translate(-50%,-50%) scale(1.4);}
  }

  /* ── Popup ── */
  .tin-popup .leaflet-popup-content-wrapper{
    background:var(--paper);color:var(--ink);
    border:1px solid var(--ink);border-radius:2px;
    box-shadow:0 6px 22px rgba(0,0,0,.12);padding:0;
  }
  .tin-popup .leaflet-popup-tip{background:var(--paper);border:1px solid var(--ink);}
  .tin-popup .leaflet-popup-content{margin:0;}
  .tin-popup .leaflet-popup-close-button{color:var(--mid)!important;font-size:16px!important;top:7px;right:9px;}
  .pop{padding:15px 17px 16px;min-width:180px;}
  .pop .p-show{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);font-weight:600;margin-bottom:7px;}
  .pop .p-city{font-size:16px;font-weight:600;letter-spacing:.01em;margin-bottom:3px;}
  .pop .p-date{font-size:12.5px;color:var(--mid);font-weight:400;letter-spacing:.02em;margin-bottom:13px;}
  .pop .p-tix{
    display:inline-block;font-family:var(--font);font-size:11px;font-weight:600;
    letter-spacing:.11em;text-transform:uppercase;text-decoration:none;
    padding:8px 16px;border:1px solid var(--ink);border-radius:999px;
    color:var(--ink);background:var(--paper);transition:background .15s,color .15s;
  }
  .pop .p-tix:hover{background:var(--ink);color:var(--paper);}
  .pop .p-soon{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mid);font-weight:400;}

  .leaflet-container{font-family:var(--font);}
  .leaflet-bar a{background:#161616;color:#fff;border-bottom:1px solid #2a2a2a;}
  .leaflet-bar a:hover{background:#242424;color:#fff;}
  .leaflet-control-attribution{background:rgba(0,0,0,.6)!important;color:#888!important;}
  .leaflet-control-attribution a{color:#aaa!important;}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <div class="eyebrow">Upcoming Shows</div>
    <div id="row">
      <button class="toggle active" data-region="all">All</button>
      <button class="toggle" data-region="usa">USA</button>
      <button class="toggle" data-region="intl">International</button>
      <div id="count"></div>
    </div>
    <div id="next-line" class="hidden"></div>
  </div>

  <div id="notice"></div>
  <div id="loading">Loading tour dates…</div>
  <div id="map" style="display:none;"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

/* Which country-field values count as USA. Everything else is International.
   Edit to match exactly what's stored in your `country` field. */
const US_COUNTRY = new Set(["united states","united states of america","usa","us","u.s.","u.s.a."]);

/* Fallback: if `country` is blank, treat the show as US when `stateCountry`
   looks like a US state (abbreviation or full name). */
const US_STATES = new Set(("al|ak|az|ar|ca|co|ct|de|fl|ga|hi|id|il|in|ia|ks|ky|la|me|md|ma|mi|mn|ms|mo|mt|"+
  "ne|nv|nh|nj|nm|ny|nc|nd|oh|ok|or|pa|ri|sc|sd|tn|tx|ut|vt|va|wa|wv|wi|wy|dc|"+
  "alabama|alaska|arizona|arkansas|california|colorado|connecticut|delaware|florida|georgia|hawaii|idaho|"+
  "illinois|indiana|iowa|kansas|kentucky|louisiana|maine|maryland|massachusetts|michigan|minnesota|mississippi|"+
  "missouri|montana|nebraska|nevada|new hampshire|new jersey|new mexico|new york|north carolina|north dakota|"+
  "ohio|oklahoma|oregon|pennsylvania|rhode island|south carolina|south dakota|tennessee|texas|utah|vermont|"+
  "virginia|washington|west virginia|wisconsin|wyoming").split("|"));

/* ── Date helpers — prefer the real `date` field, fall back to text ── */
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function getDate(s){
  if(s.date){ const d=new Date(s.date); if(!isNaN(d)) return d; }
  if(s.longDate){ const d=new Date(s.longDate); if(!isNaN(d)) return d; }
  return null;
}
function isUpcoming(s){ return s.dateObj && s.dateObj >= TODAY; }
function byDate(a,b){ return (a.dateObj||8e15) - (b.dateObj||8e15); }

/* ── Region helper ── */
function isUS(s){
  const c=(s.country||"").trim().toLowerCase();
  if(c) return US_COUNTRY.has(c);
  const sc=(s.stateCountry||"").trim().toLowerCase();
  return US_STATES.has(sc);
}

/* ── Normalise whatever the endpoint returns into flat objects ── */
function normalize(raw){
  const rows = raw.items || raw.dataItems || [];
  return rows.map(r => {
    const f = r.data || r;                 // Velo items vs REST dataItems
    const s = {
      show:         f.show || "",
      city:         f.city || "",
      stateCountry: f.stateCountry || "",
      country:      f.country || "",
      longDate:     f.longDate || "",
      date:         f.date || "",
      ticketLink:   f.ticketLink || "",
      lat:  parseFloat(f.latitude),
      lng:  parseFloat(f.longitude)
    };
    s.dateObj = getDate(s);
    return s;
  }).filter(s => !isNaN(s.lat) && !isNaN(s.lng));
}

async function loadShows(){
  try{
    const res = await fetch(DATA_URL, {method:"GET"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    return {shows: normalize(await res.json()), error:null};
  }catch(err){
    console.error("Couldn't load tour dates:", err.message);
    return {shows: [], error:err.message};
  }
}

/* ── State: only upcoming shows ever exist here ── */
let map, upcoming=[], markers=[], region="all";

function currentList(){
  if(region==="usa")  return upcoming.filter(isUS);
  if(region==="intl") return upcoming.filter(s=>!isUS(s));
  return upcoming;
}

function initMap(){
  document.getElementById("loading").style.display="none";
  document.getElementById("map").style.display="block";
  map = L.map("map",{
    zoomControl:true, scrollWheelZoom:false, attributionControl:true, worldCopyJump:true
  }).setView([30,0],2);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
    attribution:'&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains:"abcd", maxZoom:19
  }).addTo(map);
  map.zoomControl.setPosition("bottomright");
}

function makeIcon(isNext, dx){
  dx = dx || 0;   // horizontal pixel nudge for markers sharing exact coordinates
  return L.divIcon({
    className:"",
    html:`<div class="tin-pin ${isNext?'is-next':''}"><img src="${LOGO}" alt=""></div>`,
    iconSize:[32,32], iconAnchor:[16 - dx, 16], popupAnchor:[dx, -14]
  });
}

/* Markers at the exact same lat/lng (e.g. two Madrid shows) would stack and
   only the top one would be clickable. Fan each co-located group apart by a
   fixed pixel amount so they slightly overlap but are all clickable — the
   offset is in screen pixels, so the gap stays constant at every zoom. */
function offsetsFor(list){
  const groups = {};
  list.forEach(s => {
    const key = s.lat.toFixed(5) + "," + s.lng.toFixed(5);
    (groups[key] = groups[key] || []).push(s);
  });
  const out = new Map();
  Object.values(groups).forEach(g => {
    const n = g.length, spacing = 22;   // 22px centers → ~10px overlap on 32px pins
    g.forEach((s, i) => out.set(s, n === 1 ? 0 : Math.round((i - (n - 1) / 2) * spacing)));
  });
  return out;
}

function popupHtml(s){
  const tix = s.ticketLink
    ? `<a class="p-tix" href="${s.ticketLink}" target="_blank" rel="noopener">Tickets</a>`
    : `<span class="p-soon">Tickets soon</span>`;
  const place = [s.city, s.stateCountry].filter(Boolean).join(", ");
  return `<div class="pop">
      ${s.show?`<div class="p-show">${s.show}</div>`:""}
      <div class="p-city">${place}</div>
      <div class="p-date">${s.longDate||""}</div>
      ${tix}
    </div>`;
}

function render(list){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  const next = list[0];                 // list is already sorted by date
  const off = offsetsFor(list);
  list.forEach(s=>{
    const dx = off.get(s) || 0;
    const m = L.marker([s.lat,s.lng],{icon:makeIcon(s===next, dx), riseOnHover:true}).addTo(map);
    if(dx) m.setZIndexOffset(1000);     // lift fanned pins above any single ones nearby
    m.bindPopup(popupHtml(s),{className:"tin-popup",maxWidth:260,closeButton:true});
    markers.push(m);
  });
  const n=list.length;
  document.getElementById("count").innerHTML =
    n ? `<b>${n}</b> ${n===1?"show":"shows"}` : "No upcoming shows";
  const nl=document.getElementById("next-line");
  if(next){
    const place=[next.city,next.stateCountry].filter(Boolean).join(", ");
    nl.innerHTML=`Next: <b>${place}</b> · ${next.longDate||""}`;
    nl.classList.remove("hidden");
  }else{ nl.classList.add("hidden"); }
}

/* ── Fit the viewport to the shows in view, padded to clear the bar ── */
function fitTo(list){
  if(list.length===0){ map.setView([30,0],2,{animate:true}); return; }
  const barH = document.getElementById("bar").offsetHeight || 90;
  const padTop = barH + 24;
  if(list.length===1){ map.setView([list[0].lat,list[0].lng],6,{animate:true}); return; }
  const bounds = L.latLngBounds(list.map(s=>[s.lat,s.lng]));
  map.fitBounds(bounds,{
    paddingTopLeft:[28,padTop], paddingBottomRight:[28,44],
    maxZoom:8, animate:true, duration:0.9
  });
}

function apply(){ const list=currentList(); render(list); fitTo(list); }

/* ── Region filter ── */
document.querySelectorAll(".toggle").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".toggle").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    region=btn.dataset.region;
    apply();
  });
});

/* ── Keep the fit correct on resize / orientation change ── */
let rt;
window.addEventListener("resize",()=>{
  clearTimeout(rt);
  rt=setTimeout(()=>{ if(map){ map.invalidateSize(); apply(); } },200);
});

/* ── Boot ── */
(async()=>{
  const {shows,error}=await loadShows();
  upcoming = shows.filter(isUpcoming).sort(byDate);   // upcoming only, ever
  initMap();
  if(error){
    const nt=document.getElementById("notice");
    nt.style.display="block";
    nt.textContent="Couldn't load tour dates right now — please check back soon.";
  }
  apply();
  setTimeout(()=>map.invalidateSize(),300);
})();
</script>
